name: Plugin auto-release

on:
  workflow_call:
    inputs:
      plugin-name:
        required: true
        type: string
      run-tests:
        required: false
        type: boolean
        default: false
      node-version:
        required: false
        type: number
        default: 22
    secrets:
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ${{ inputs.plugin-name }},claude-plugins

      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        if: inputs.run-tests
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install dependencies and run tests
        if: inputs.run-tests
        run: |
          npm ci
          npm test

      - name: Bump patch version
        id: bump
        run: |
          PLUGIN_JSON=".claude-plugin/plugin.json"
          current=$(jq -r '.version' "$PLUGIN_JSON")
          IFS='.' read -r major minor patch <<< "$current"
          new="${major}.${minor}.$((patch + 1))"
          jq --arg v "$new" '.version = $v' "$PLUGIN_JSON" > tmp.json && mv tmp.json "$PLUGIN_JSON"
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "Bumped $current -> $new"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          git commit -m "Release v${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Update marketplace
        run: |
          git clone https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/EliasSchlie/claude-plugins.git /tmp/marketplace
          cd /tmp/marketplace
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Retry loop: handle concurrent pushes from other plugin repos
          for attempt in 1 2 3; do
            git pull --rebase origin main
            jq --arg v "${{ steps.bump.outputs.version }}" \
              '(.plugins[] | select(.name == "${{ inputs.plugin-name }}")).version = $v' \
              .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json
            git add .claude-plugin/marketplace.json
            git diff --cached --quiet && exit 0
            git commit -m "Bump ${{ inputs.plugin-name }} to ${{ steps.bump.outputs.version }} [skip ci]"
            git push && exit 0
            echo "Push failed (attempt $attempt), retrying..."
            git reset --soft HEAD~1
            sleep $((attempt * 2))
          done
          echo "Failed after 3 attempts" && exit 1
